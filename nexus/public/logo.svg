<!--
  NEXUS — horizontal logotype (dark-background variant)
  Canvas: 248 × 56 px  |  Icon: 56 × 56  |  Wordmark: Playfair Display 700
  Safe on: #0D0C14 app bg, #030712 card bg, any colour that isn't near-white
-->
<svg width="248" height="56" viewBox="0 0 248 56" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- ── Icon mark ─────────────────────────────────────────────── -->
  <!-- Background tile -->
  <rect width="56" height="56" rx="14" fill="#030712"/>
  <!-- Gradient border ring (sky→violet, 40% opacity) -->
  <rect x="0.75" y="0.75" width="54.5" height="54.5" rx="13.25"
        stroke="url(#border_dark)" stroke-width="1.5"/>
  <!-- N lettermark — path scaled ×1.75 from 32 px source -->
  <path d="M17.5 38.5V17.5L38.5 38.5V17.5"
        stroke="url(#n_dark)" stroke-width="4.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── Wordmark ───────────────────────────────────────────────── -->
  <text x="72" y="38"
        font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-size="26" font-weight="700" letter-spacing="4"
        fill="#FFFFFF">NEXUS</text>

  <defs>
    <linearGradient id="n_dark" x1="17.5" y1="17.5" x2="38.5" y2="38.5" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="border_dark" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0EA5E9" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0.45"/>
    </linearGradient>
  </defs>
</svg>
